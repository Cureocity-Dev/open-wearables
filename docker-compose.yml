services:
  app:
    build:
        context: ./backend
        dockerfile: Dockerfile
    container_name: backend__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/app.sh
    env_file:
      - ./backend/config/.env
    environment:
      - REDIS_HOST=redis
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  celery-worker:
    container_name: celery-worker__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/worker.sh
    env_file:
      - ./backend/config/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
      - app
    restart: unless-stopped

  celery-beat:
    container_name: celery-beat__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/beat.sh
    env_file:
      - ./backend/config/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
      - app
    restart: unless-stopped

  flower:
    container_name: flower__open-wearables
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/flower.sh
    env_file:
      - ./backend/config/.env
    environment:
      - REDIS_HOST=redis
    ports:
      - 5555:5555
    depends_on:
      - redis
      - app
    restart: unless-stopped

  redis:
    container_name: redis__open-wearables
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/var/lib/redis/data
    restart: unless-stopped

  svix-server:
    container_name: svix-server__open-wearables
    image: svix/svix-server:v1
    entrypoint:
      - sh
      - -c
      - |
        : "$${SVIX_JWT_SECRET:=$$SECRET_KEY}"
        export SVIX_JWT_SECRET
        exec svix-server "$$@"
      - --
    command: ["--run-migrations"]
    env_file:
      - ./backend/config/.env
    environment:
      SVIX_DB_DSN: "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/svix"
      SVIX_QUEUE_TYPE: "redis"
      SVIX_REDIS_DSN: "redis://redis:6379/1"
      SVIX_CACHE_TYPE: "redis"
    expose:
      - "8071"
    depends_on:
      redis:
        condition: service_started
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "svix-server", "healthcheck", "http://localhost:8071"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL in your environment}
    container_name: frontend__open-wearables
    image: open-wearables-frontend:latest
    pull_policy: never
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  redis_data: