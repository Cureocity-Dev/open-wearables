name: Deploy to EC2

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_IP }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            # Navigate to project directory
            mkdir -p ~/open-wearables
            cd ~/open-wearables

            # If not a git repo, clone it
            if [ ! -d .git ]; then
              git clone git@github-wearable:${{ github.repository }}.git .
            fi

            # Pull latest changes
            git pull origin ${{ github.ref_name }}

            # Handle .env file (copy from /home/ubuntu/wearable.env)
            if [ -f /home/ubuntu/wearable.env ]; then
              cp /home/ubuntu/wearable.env backend/config/.env
              echo "Updated backend/config/.env from /home/ubuntu/wearable.env"
            elif [ ! -f backend/config/.env ]; then
              cp backend/config/.env.example backend/config/.env
              echo "Warning: /home/ubuntu/wearable.env not found. Created from example."
            fi

            # Rebuild images (code changes invalidate the COPY layer, so
            # normal cache is fine and fast). Builds app + frontend; the shared
            # open-wearables-platform:latest image is produced by the app build.
            docker compose build

            # Clean restart. --force-recreate recreates EVERY container — without
            # it, worker/beat/flower keep the old container (they share the
            # :latest image with no build section, so compose thinks they are
            # unchanged and skips them, leaving stale code running).
            docker compose up -d --force-recreate --remove-orphans

            # Drop dangling images left by the rebuild.
            docker image prune -f

            # Show resulting state in the deploy log.
            docker compose ps
