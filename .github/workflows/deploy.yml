name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_IP }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            # Navigate to project directory
            mkdir -p ~/open-wearables
            cd ~/open-wearables

            # If not a git repo, clone it
            if [ ! -d .git ]; then
              git clone git@github-wearable:${{ github.repository }}.git .
            fi

            # Pull latest changes
            git pull origin ${{ github.ref_name }}

            # Handle .env file (copy from /home/ubuntu/wearable.env)
            if [ -f /home/ubuntu/wearable.env ]; then
              cp /home/ubuntu/wearable.env backend/config/.env
              echo "Updated backend/config/.env from /home/ubuntu/wearable.env"
            elif [ ! -f backend/config/.env ]; then
              cp backend/config/.env.example backend/config/.env
              echo "Warning: /home/ubuntu/wearable.env not found. Created from example."
            fi

            # Remove existing containers
            docker compose down

            # Rebuild and restart containers
            docker compose up -d --build
